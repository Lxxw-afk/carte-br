<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BRIGADE DE RECHERCHE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-box">
    <input type="password" id="access-code" placeholder="Code">
    <button id="login-btn">Connexion</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- TOPBAR -->
  <div id="topbar">
    <h1>BRIGADE</h1>

    <button id="new-point-btn">Nouveau point</button>

    <input id="search-input" placeholder="Rechercher">

    <div id="filter-menu">
      <button id="toggle-filter">CATÉGORIES</button>
      <div id="filter-panel" class="hidden"></div>
    </div>
  </div>

  <button id="credit-btn">Créé par Julien Flament</button>

  <div id="step1" class="hidden">Cliquez sur la carte</div>

  <div id="map-container">
    <div id="map-inner">
      <img id="map" src="images/map.png">
    </div>
    <div id="marker-layer"></div>
  </div>

  <div id="point-menu" class="hidden">
    <input id="point-name" placeholder="Nom">
    <select id="point-icon"></select>
    <select id="point-category">
      <option>Drogue</option>
      <option>Entrepôt</option>
      <option>QG</option>
      <option>Munition</option>
      <option>PNJ</option>
    </select>

    <button id="validate-point">Valider</button>
    <button id="cancel-point">Annuler</button>
  </div>

  <div id="marker-menu" class="hidden">
    <button id="delete-marker">Supprimer</button>
  </div>

  <div id="tooltip"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
