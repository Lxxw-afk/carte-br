<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>BRIGADE DE RECHERCHES</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>

<!-- LOGIN -->
<div id="login-screen">
    <img src="images/Brigade2recherches.png" id="login-bg">

    <div id="login-box">
        <input type="password" id="access-code" placeholder="Code d'accès">
        <button id="login-btn">Connexion</button>
        <div id="login-error"></div>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <div id="topbar">
        <h1>BRIGADE DE RECHERCHE</h1>

        <button id="new-point-btn">Nouveau point</button>

        <input type="text" id="search-input" placeholder="Rechercher un point">
    </div>

    <button id="credit-btn">Créé par Julien Flament | Lxxw.</button>

    <div id="step1" class="hidden">
        👉 Cliquez sur la carte pour placer votre point.
    </div>

    <div id="map-container">
        <div id="map-inner">
            <img id="map" src="images/map.png" alt="Carte RP">
        </div>
        <div id="marker-layer"></div>
    </div>

    <div id="point-menu" class="hidden">
        <div class="point-box">
            <h3>Configurer le point</h3>

            <label>Nom :</label>
            <input id="point-name" type="text">

            <label>Icône :</label>
            <select id="point-icon"></select>

            <label>Catégorie :</label>
            <select id="point-category">
                <option value="">Choisir</option>
                <option value="Drogue">Drogue</option>
                <option value="Entrepôt">Entrepôt</option>
                <option value="QG">QG</option>
                <option value="Munition">Munition</option>
                <option value="Trafic d'organe">Trafic d'organe</option>
                <option value="PNJ">PNJ</option>
            </select>

            <button id="validate-point">Valider</button>
            <button id="cancel-point">Annuler</button>
        </div>
    </div>

    <div id="marker-menu" class="hidden">
        <button id="edit-marker">Modifier</button>
        <button id="move-marker">Déplacer</button>
        <button id="delete-marker">Supprimer</button>
    </div>

    <div id="tooltip"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script src="script.js" defer></script>

</body>
</html>
